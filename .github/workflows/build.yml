name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" 2>/dev/null || true

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --rerun-tasks

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Position-Size-Calculator-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
