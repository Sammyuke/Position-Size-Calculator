name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" 2>/dev/null || true

      - name: Decode debug keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          fi

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Position-Size-Calculator-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
